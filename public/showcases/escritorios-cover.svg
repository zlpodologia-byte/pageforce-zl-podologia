<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320">
  <rect width="480" height="320" fill="#0c1220"/>
  <!-- institutional seal / monogram -->
  <g transform="translate(240,150)">
    <!-- outer ring -->
    <circle r="92" fill="none" stroke="#b78b4d" stroke-width="1.2"/>
    <circle r="82" fill="none" stroke="#b78b4d" stroke-width="0.6"/>
    <!-- laurel ticks -->
    <g stroke="#b78b4d" stroke-width="1">
      <line x1="0" y1="-92" x2="0" y2="-82"/>
      <line x1="92" y1="0" x2="82" y2="0"/>
      <line x1="0" y1="92" x2="0" y2="82"/>
      <line x1="-92" y1="0" x2="-82" y2="0"/>
      <line x1="65" y1="-65" x2="58" y2="-58"/>
      <line x1="65" y1="65" x2="58" y2="58"/>
      <line x1="-65" y1="65" x2="-58" y2="58"/>
      <line x1="-65" y1="-65" x2="-58" y2="-58"/>
    </g>
    <!-- monogram P F -->
    <text x="0" y="14" font-family="Georgia, serif" font-size="56" font-style="italic" fill="#b78b4d" text-anchor="middle">PF</text>
    <!-- bottom ribbon -->
    <rect x="-46" y="42" width="92" height="14" fill="#b78b4d"/>
    <text x="0" y="53" font-family="Arial, sans-serif" font-size="9" fill="#0c1220" text-anchor="middle" letter-spacing="2">EST MMXXV</text>
  </g>
  <!-- corner accents -->
  <g stroke="#b78b4d" stroke-width="1.2" fill="none">
    <path d="M 30 30 L 30 70 M 30 30 L 70 30"/>
    <path d="M 450 30 L 450 70 M 450 30 L 410 30"/>
    <path d="M 30 260 L 30 230 M 30 260 L 70 260"/>
    <path d="M 450 260 L 450 230 M 450 260 L 410 260"/>
  </g>
  <rect x="16" y="280" width="260" height="28" fill="#0c1220"/>
  <text x="24" y="298" font-family="Georgia, serif" font-size="20" fill="#f4f6f5">Escritorios especializados</text>
</svg>
