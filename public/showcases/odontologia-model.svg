      <rect x="656" y="96" width="216" height="10" rx="4" fill="#d8dce0"/>
      <rect x="656" y="116" width="160" height="10" rx="4" fill="#d8dce0"/>
    </g>
  </g>
  <!-- trust -->
  <g transform="translate(0,520)">
    <rect width="960" height="80" fill="#0c1220"/>
    <g fill="#ffffff" opacity="0.85">
      <circle cx="140" cy="40" r="10"/>
      <rect x="160" y="34" width="120" height="5" rx="2"/>
      <rect x="160" y="44" width="90" height="5" rx="2"/>
      <circle cx="430" cy="40" r="10"/>
      <rect x="450" y="34" width="120" height="5" rx="2"/>
      <rect x="450" y="44" width="80" height="5" rx="2"/>
      <circle cx="720" cy="40" r="10"/>
      <rect x="740" y="34" width="120" height="5" rx="2"/>
      <rect x="740" y="44" width="100" height="5" rx="2"/>
    </g>
  </g>
