<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320">
  <rect width="480" height="320" fill="#f4f6f5"/>
  <!-- timeline -->
  <g transform="translate(60,160)">
    <line x1="0" y1="0" x2="360" y2="0" stroke="#64748b" stroke-width="2"/>
    <!-- step 1 -->
    <circle cx="0" cy="0" r="16" fill="#64748b"/>
    <circle cx="0" cy="0" r="7" fill="#f4f6f5"/>
    <text x="-38" y="-30" font-family="Arial, sans-serif" font-size="12" fill="#0c1220">Orcamento</text>
    <rect x="-42" y="22" width="84" height="6" rx="3" fill="#d8dce0"/>
    <!-- step 2 -->
    <circle cx="180" cy="0" r="16" fill="#2d9d8a"/>
    <circle cx="180" cy="0" r="7" fill="#f4f6f5"/>
    <text x="154" y="-30" font-family="Arial, sans-serif" font-size="12" fill="#0c1220">Entrega</text>
    <rect x="142" y="22" width="76" height="6" rx="3" fill="#2d9d8a"/>
    <!-- step 3 -->
    <circle cx="360" cy="0" r="16" fill="#64748b" opacity="0.4"/>
    <circle cx="360" cy="0" r="7" fill="#f4f6f5"/>
    <text x="324" y="-30" font-family="Arial, sans-serif" font-size="12" fill="#0c1220">Pos-venda</text>
    <rect x="324" y="22" width="72" height="6" rx="3" fill="#d8dce0"/>
  </g>
  <!-- top frame -->
  <rect x="30" y="40" width="420" height="54" rx="10" fill="#ffffff" stroke="#d8dce0"/>
  <circle cx="54" cy="67" r="10" fill="#2d9d8a"/>
  <rect x="74" y="56" width="200" height="8" rx="4" fill="#0c1220"/>
  <rect x="74" y="70" width="140" height="7" rx="3" fill="#64748b" opacity="0.5"/>
  <rect x="390" y="54" width="48" height="24" rx="12" fill="#64748b"/>
  <text x="400" y="70" font-family="Arial, sans-serif" font-size="11" fill="#ffffff">OK</text>
  <!-- bottom progress -->
  <rect x="60" y="230" width="360" height="10" rx="5" fill="#d8dce0"/>
  <rect x="60" y="230" width="210" height="10" rx="5" fill="#64748b"/>
  <text x="24" y="298" font-family="Georgia, serif" font-size="20" fill="#0c1220">Servicos gerais</text>
</svg>
