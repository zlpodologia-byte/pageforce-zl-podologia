      <rect x="32" y="44" width="72" height="8" rx="4" fill="#cfe4ee"/>
    </g>
    <g>
      <circle cx="18" cy="74" r="6" fill="none" stroke="#cfe4ee" stroke-width="2"/>
      <rect x="32" y="70" width="94" height="8" rx="4" fill="#cfe4ee" opacity="0.7"/>
    </g>
