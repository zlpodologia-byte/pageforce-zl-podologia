<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320">
  <rect width="480" height="320" fill="#ffffff"/>
  <rect width="480" height="320" fill="#cfe4ee" opacity="0.25"/>
  <!-- dental arc (abstract) -->
  <g transform="translate(240,170)">
    <path d="M -140 0 Q -140 -120 0 -120 Q 140 -120 140 0" fill="none" stroke="#0c1220" stroke-width="2" opacity="0.85"/>
    <g fill="#cfe4ee" stroke="#0c1220" stroke-width="1.2">
      <rect x="-130" y="-22" width="24" height="28" rx="6"/>
      <rect x="-100" y="-48" width="24" height="32" rx="6"/>
      <rect x="-70" y="-72" width="24" height="34" rx="7"/>
      <rect x="-40" y="-90" width="24" height="36" rx="7"/>
      <rect x="-8" y="-96" width="24" height="36" rx="7"/>
      <rect x="24" y="-90" width="24" height="36" rx="7"/>
      <rect x="56" y="-72" width="24" height="34" rx="7"/>
      <rect x="86" y="-48" width="24" height="32" rx="6"/>
      <rect x="116" y="-22" width="24" height="28" rx="6"/>
    </g>
    <!-- highlighted tooth -->
    <rect x="-8" y="-96" width="24" height="36" rx="7" fill="#2d9d8a"/>
