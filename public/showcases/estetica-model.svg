<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" width="960" height="600">
  <rect width="960" height="600" fill="#f4f6f5"/>
  <!-- nav -->
  <rect width="960" height="60" fill="#ffffff"/>
  <rect x="32" y="22" width="120" height="16" rx="3" fill="#0c1220"/>
  <g fill="#64748b">
    <rect x="420" y="26" width="50" height="8" rx="4"/>
    <rect x="486" y="26" width="60" height="8" rx="4"/>
    <rect x="562" y="26" width="54" height="8" rx="4"/>
    <rect x="632" y="26" width="48" height="8" rx="4"/>
  </g>
  <rect x="820" y="16" width="116" height="28" rx="14" fill="#c2410c"/>
  <text x="846" y="35" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">Agendar</text>
  <line x1="0" y1="60" x2="960" y2="60" stroke="#e9c4c0"/>
  <!-- hero -->
  <g transform="translate(0,60)">
    <rect width="960" height="280" fill="#f4f6f5"/>
    <text x="48" y="90" font-family="Georgia, serif" font-size="44" fill="#0c1220">Resultado</text>
    <text x="48" y="140" font-family="Georgia, serif" font-size="44" fill="#0c1220" font-style="italic">natural,</text>
    <text x="48" y="190" font-family="Georgia, serif" font-size="44" fill="#0c1220">toque artesanal.</text>
    <rect x="48" y="220" width="140" height="14" rx="7" fill="#0c1220"/>
    <rect x="198" y="220" width="96" height="14" rx="7" fill="#e9c4c0"/>
    <!-- before/after panel -->
    <g transform="translate(560,36)">
      <rect x="0" y="0" width="170" height="208" rx="12" fill="#e9c4c0" opacity="0.55"/>
      <circle cx="85" cy="80" r="36" fill="#ffffff" opacity="0.75"/>
      <rect x="30" y="134" width="110" height="8" rx="4" fill="#ffffff" opacity="0.75"/>
      <rect x="30" y="152" width="90" height="8" rx="4" fill="#ffffff" opacity="0.55"/>
      <rect x="180" y="0" width="170" height="208" rx="12" fill="#e9c4c0"/>
      <circle cx="265" cy="80" r="36" fill="#ffffff"/>
      <rect x="210" y="134" width="110" height="8" rx="4" fill="#ffffff"/>
      <rect x="210" y="152" width="90" height="8" rx="4" fill="#ffffff" opacity="0.85"/>
    </g>
  </g>
  <!-- cards -->
  <g transform="translate(0,360)">
    <g>
      <rect x="32" y="16" width="296" height="160" rx="10" fill="#ffffff" stroke="#e9c4c0" stroke-width="1.5"/>
      <path d="M 64 60 L 72 44 L 80 60 L 72 76 Z" fill="#e9c4c0"/>
      <rect x="56" y="96" width="216" height="10" rx="4" fill="#d8dce0"/>
      <rect x="56" y="116" width="170" height="10" rx="4" fill="#d8dce0"/>
    </g>
    <g>
      <rect x="332" y="16" width="296" height="160" rx="10" fill="#ffffff" stroke="#e9c4c0" stroke-width="1.5"/>
      <circle cx="372" cy="60" r="18" fill="#e9c4c0"/>
      <circle cx="372" cy="60" r="8" fill="#f4f6f5"/>
      <rect x="356" y="96" width="216" height="10" rx="4" fill="#d8dce0"/>
      <rect x="356" y="116" width="190" height="10" rx="4" fill="#d8dce0"/>
    </g>
    <g>
      <rect x="632" y="16" width="296" height="160" rx="10" fill="#ffffff" stroke="#e9c4c0" stroke-width="1.5"/>
      <g transform="translate(672,60)" fill="#e9c4c0">
        <path d="M 0 -16 L 4 -4 L 16 0 L 4 4 L 0 16 L -4 4 L -16 0 L -4 -4 Z"/>
      </g>
      <rect x="656" y="96" width="216" height="10" rx="4" fill="#d8dce0"/>
      <rect x="656" y="116" width="160" height="10" rx="4" fill="#d8dce0"/>
    </g>
  </g>
  <!-- trust -->
  <g transform="translate(0,520)">
    <rect width="960" height="80" fill="#0c1220"/>
    <g fill="#ffffff" opacity="0.85">
      <circle cx="140" cy="40" r="10"/>
      <rect x="160" y="34" width="120" height="5" rx="2"/>
      <rect x="160" y="44" width="90" height="5" rx="2"/>
      <circle cx="430" cy="40" r="10"/>
      <rect x="450" y="34" width="120" height="5" rx="2"/>
      <rect x="450" y="44" width="80" height="5" rx="2"/>
      <circle cx="720" cy="40" r="10"/>
      <rect x="740" y="34" width="120" height="5" rx="2"/>
      <rect x="740" y="44" width="100" height="5" rx="2"/>
