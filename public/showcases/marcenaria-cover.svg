<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320">
  <rect width="480" height="320" fill="#f0ead4"/>
  <!-- technical drawing frame -->
  <rect x="40" y="40" width="400" height="220" fill="#ffffff" stroke="#a0662d" stroke-width="2"/>
  <!-- title block bar -->
  <rect x="40" y="220" width="400" height="40" fill="#a0662d"/>
  <rect x="54" y="232" width="120" height="6" rx="3" fill="#f0ead4"/>
  <rect x="54" y="244" width="80" height="5" rx="2" fill="#f0ead4" opacity="0.7"/>
  <rect x="300" y="232" width="60" height="16" rx="3" fill="#f0ead4" opacity="0.3"/>
  <rect x="370" y="232" width="54" height="16" rx="3" fill="#f0ead4"/>
  <!-- chair / furniture sketch -->
  <g transform="translate(240,150)" stroke="#a0662d" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- seat -->
    <rect x="-50" y="-10" width="100" height="16" rx="2" fill="#a0662d" fill-opacity="0.25"/>
    <!-- back -->
    <line x1="-40" y1="-10" x2="-40" y2="-56"/>
    <line x1="40" y1="-10" x2="40" y2="-56"/>
    <line x1="-40" y1="-56" x2="40" y2="-56"/>
    <line x1="-32" y1="-44" x2="32" y2="-44"/>
    <line x1="-32" y1="-32" x2="32" y2="-32"/>
    <line x1="-32" y1="-20" x2="32" y2="-20"/>
    <!-- legs -->
    <line x1="-44" y1="6" x2="-44" y2="50"/>
    <line x1="44" y1="6" x2="44" y2="50"/>
    <line x1="-30" y1="6" x2="-30" y2="36"/>
  </g>
  <!-- dimension ticks -->
  <g stroke="#a0662d" stroke-width="1" stroke-dasharray="3 3">
    <line x1="54" y1="70" x2="160" y2="70"/>
    <line x1="54" y1="62" x2="54" y2="78"/>
    <line x1="160" y1="62" x2="160" y2="78"/>
  </g>
  <text x="82" y="64" font-family="Arial, sans-serif" font-size="10" fill="#a0662d">L 120cm</text>
  <text x="24" y="298" font-family="Georgia, serif" font-size="20" fill="#0c1220">Marcenaria</text>
</svg>
