<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320">
  <rect width="480" height="320" fill="#1a2340"/>
  <!-- scan grid -->
  <g stroke="#2d9d8a" stroke-width="0.6" opacity="0.35">
    <line x1="0" y1="40" x2="480" y2="40"/>
    <line x1="0" y1="80" x2="480" y2="80"/>
    <line x1="0" y1="120" x2="480" y2="120"/>
    <line x1="0" y1="160" x2="480" y2="160"/>
    <line x1="0" y1="200" x2="480" y2="200"/>
    <line x1="0" y1="240" x2="480" y2="240"/>
  </g>
  <!-- silhouette (abstract torso/head) -->
  <g transform="translate(240,170)">
    <ellipse cx="0" cy="-54" rx="34" ry="40" fill="none" stroke="#2d9d8a" stroke-width="2"/>
    <path d="M -60 40 Q -60 -14 0 -14 Q 60 -14 60 40 Z" fill="none" stroke="#2d9d8a" stroke-width="2"/>
    <circle cx="0" cy="10" r="22" fill="none" stroke="#2d9d8a" stroke-width="1" opacity="0.6"/>
    <circle cx="0" cy="10" r="6" fill="#2d9d8a"/>
  </g>
  <!-- scan line bright -->
  <rect x="0" y="158" width="480" height="4" fill="#2d9d8a" opacity="0.85"/>
  <rect x="0" y="152" width="480" height="16" fill="#2d9d8a" opacity="0.12"/>
  <!-- chips -->
  <rect x="30" y="30" width="70" height="20" rx="10" fill="#2d9d8a" opacity="0.25"/>
  <rect x="40" y="38" width="40" height="4" rx="2" fill="#2d9d8a"/>
  <rect x="380" y="30" width="70" height="20" rx="4" fill="#ffffff" opacity="0.1"/>
  <circle cx="392" cy="40" r="3" fill="#2d9d8a"/>
  <rect x="400" y="38" width="42" height="4" rx="2" fill="#ffffff" opacity="0.7"/>
  <!-- label -->
  <rect x="16" y="280" width="240" height="28" fill="#1a2340"/>
  <text x="24" y="298" font-family="Georgia, serif" font-size="20" fill="#f4f6f5">Diagnostico por imagem</text>
</svg>
