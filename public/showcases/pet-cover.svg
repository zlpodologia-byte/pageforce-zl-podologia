<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320">
  <rect width="480" height="320" fill="#f4f6f5"/>
  <!-- paw print (dominant) -->
  <g transform="translate(170,155)" fill="#d9a441">
    <ellipse cx="0" cy="20" rx="48" ry="40"/>
    <ellipse cx="-50" cy="-20" rx="16" ry="22"/>
    <ellipse cx="-22" cy="-44" rx="15" ry="22"/>
    <ellipse cx="22" cy="-44" rx="15" ry="22"/>
    <ellipse cx="50" cy="-20" rx="16" ry="22"/>
  </g>
  <!-- agenda card (dupla) -->
  <g transform="translate(272,58)">
    <rect width="180" height="80" rx="10" fill="#ffffff" stroke="#d9a441" stroke-width="2"/>
    <circle cx="24" cy="28" r="10" fill="#d9a441" opacity="0.25"/>
    <circle cx="24" cy="28" r="4" fill="#d9a441"/>
    <rect x="44" y="20" width="110" height="7" rx="3" fill="#0c1220"/>
    <rect x="44" y="32" width="80" height="6" rx="3" fill="#d8dce0"/>
