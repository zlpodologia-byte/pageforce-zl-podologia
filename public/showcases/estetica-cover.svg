<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320">
  <rect width="480" height="320" fill="#f4f6f5"/>
  <!-- before / after grid -->
  <g transform="translate(60,50)">
    <!-- before -->
    <rect x="0" y="0" width="170" height="200" rx="10" fill="#e9c4c0" opacity="0.55"/>
    <circle cx="85" cy="70" r="34" fill="#ffffff" opacity="0.7"/>
    <rect x="30" y="120" width="110" height="8" rx="4" fill="#ffffff" opacity="0.75"/>
    <rect x="30" y="138" width="90" height="8" rx="4" fill="#ffffff" opacity="0.55"/>
    <rect x="30" y="156" width="70" height="8" rx="4" fill="#ffffff" opacity="0.4"/>
    <rect x="10" y="174" width="44" height="18" rx="9" fill="#0c1220"/>
    <text x="20" y="187" font-family="Arial, sans-serif" font-size="11" fill="#ffffff">antes</text>
    <!-- after -->
    <rect x="190" y="0" width="170" height="200" rx="10" fill="#e9c4c0"/>
    <circle cx="275" cy="70" r="34" fill="#ffffff"/>
    <rect x="220" y="120" width="110" height="8" rx="4" fill="#ffffff"/>
    <rect x="220" y="138" width="90" height="8" rx="4" fill="#ffffff" opacity="0.85"/>
    <rect x="220" y="156" width="80" height="8" rx="4" fill="#ffffff" opacity="0.7"/>
    <rect x="200" y="174" width="50" height="18" rx="9" fill="#0c1220"/>
    <text x="210" y="187" font-family="Arial, sans-serif" font-size="11" fill="#ffffff">depois</text>
  </g>
  <!-- diagonal divider -->
  <line x1="240" y1="40" x2="240" y2="268" stroke="#f4f6f5" stroke-width="6"/>
  <!-- label -->
  <text x="24" y="298" font-family="Georgia, serif" font-size="20" fill="#0c1220">Estetica &amp; beleza</text>
  <!-- sparkle -->
  <g transform="translate(420,60)" fill="#0c1220">
    <path d="M 0 -14 L 3 -3 L 14 0 L 3 3 L 0 14 L -3 3 L -14 0 L -3 -3 Z"/>
  </g>
</svg>
