<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320">
  <rect width="480" height="320" fill="#f4f6f5"/>
  <!-- agenda grid -->
  <g stroke="#d8dce0" stroke-width="1" fill="none">
    <rect x="60" y="70" width="280" height="180" rx="8" fill="#ffffff"/>
    <line x1="60" y1="110" x2="340" y2="110"/>
    <line x1="130" y1="70" x2="130" y2="250"/>
    <line x1="200" y1="70" x2="200" y2="250"/>
    <line x1="270" y1="70" x2="270" y2="250"/>
    <line x1="60" y1="150" x2="340" y2="150"/>
    <line x1="60" y1="190" x2="340" y2="190"/>
  </g>
  <!-- booked slots -->
  <rect x="134" y="114" width="62" height="32" rx="4" fill="#2d9d8a" opacity="0.85"/>
  <rect x="204" y="154" width="62" height="32" rx="4" fill="#2d9d8a" opacity="0.55"/>
  <rect x="64" y="194" width="62" height="32" rx="4" fill="#2d9d8a" opacity="0.7"/>
  <!-- chat bubble dominant -->
  <g>
    <path d="M 280 40 Q 280 24 296 24 L 432 24 Q 448 24 448 40 L 448 112 Q 448 128 432 128 L 330 128 L 310 148 L 312 128 L 296 128 Q 280 128 280 112 Z" fill="#2d9d8a"/>
    <circle cx="320" cy="76" r="5" fill="#f4f6f5"/>
    <circle cx="360" cy="76" r="5" fill="#f4f6f5"/>
    <circle cx="400" cy="76" r="5" fill="#f4f6f5"/>
  </g>
  <!-- pill chip -->
  <rect x="60" y="40" width="96" height="18" rx="9" fill="#2d9d8a" opacity="0.18"/>
  <rect x="68" y="46" width="44" height="6" rx="3" fill="#2d9d8a"/>
  <!-- label -->
  <text x="24" y="298" font-family="Georgia, serif" font-size="20" fill="#0c1220">Clinicas &amp; saude</text>
</svg>
